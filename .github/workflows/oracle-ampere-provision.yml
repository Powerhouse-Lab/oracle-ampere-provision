name: Oracle Ampere A1 Auto-Provisioner

on:
  workflow_dispatch:    # triggered externally via API
  repository_dispatch:
    types: [ampere-retry]

jobs:
  provision:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    env:
      SUPPRESS_LABEL_WARNING: True
      OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: True
      OCI_CLI_USER:        ${{ secrets.OCI_USER_OCID }}
      OCI_CLI_TENANCY:     ${{ secrets.OCI_TENANCY_OCID }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_KEY_FINGERPRINT }}
      OCI_CLI_REGION:      ${{ secrets.OCI_REGION }}

    steps:
      - name: Install OCI CLI
        run: pip install oci-cli --quiet

      - name: Configure OCI credentials
        env:
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_SSH_PUB: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
        run: |
          mkdir -p ~/.oci
          python3 -c "
          import os, sys
          raw = os.environ.get('OCI_PRIVATE_KEY', '')
          raw = raw.replace('\\\\n', '\\n')
          for tag in ['RSA PRIVATE KEY', 'PRIVATE KEY', 'EC PRIVATE KEY']:
              raw = raw.replace('-----BEGIN ' + tag + '----- ', '-----BEGIN ' + tag + '-----\\n')
              raw = raw.replace(' -----END ' + tag + '-----', '\\n-----END ' + tag + '-----')
          if not raw.endswith('\\n'):
              raw += '\\n'
          with open('/home/runner/.oci/oci_api_key.pem', 'w') as f:
              f.write(raw)
          cfg = '[DEFAULT]\\n'
          cfg += 'user=' + os.environ['OCI_CLI_USER'] + '\\n'
          cfg += 'tenancy=' + os.environ['OCI_CLI_TENANCY'] + '\\n'
          cfg += 'fingerprint=' + os.environ['OCI_CLI_FINGERPRINT'] + '\\n'
          cfg += 'key_file=/home/runner/.oci/oci_api_key.pem\\n'
          cfg += 'region=' + os.environ['OCI_CLI_REGION'] + '\\n'
          with open('/home/runner/.oci/config', 'w') as f:
              f.write(cfg)
          with open('/tmp/ssh_pub.key', 'w') as f:
              f.write(os.environ.get('OCI_SSH_PUB', ''))
          print('Credentials written OK')
          "
          chmod 600 ~/.oci/oci_api_key.pem
          oci setup repair-file-permissions --file ~/.oci/config
          oci setup repair-file-permissions --file ~/.oci/oci_api_key.pem

      - name: Attempt provisioning
        id: provision
        run: |
          set +e
          echo "Attempting to provision Ampere A1..."

          OUTPUT=$(oci compute instance launch \
            --availability-domain    "${{ secrets.OCI_AD_1 }}" \
            --compartment-id         "${{ secrets.OCI_COMPARTMENT_OCID }}" \
            --shape                  VM.Standard.A1.Flex \
            --shape-config           '{"ocpus":4,"memoryInGBs":24}' \
            --image-id               "${{ secrets.OCI_IMAGE_OCID }}" \
            --subnet-id              "${{ secrets.OCI_SUBNET_OCID }}" \
            --ssh-authorized-keys-file /tmp/ssh_pub.key \
            --display-name           "ampere-always-free" \
            --assign-public-ip       true \
            2>&1)

          EXIT_CODE=$?

          if [ $EXIT_CODE -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "output<<EOF" >> $GITHUB_OUTPUT
            echo "$OUTPUT" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "Provisioned successfully!"
          elif echo "$OUTPUT" | grep -q "Out of host capacity"; then
            echo "status=capacity" >> $GITHUB_OUTPUT
            echo "Out of capacity — will retry shortly"
          else
            echo "status=error" >> $GITHUB_OUTPUT
            echo "Error: $OUTPUT"
          fi

      - name: Extract instance details
        if: steps.provision.outputs.status == 'success'
        id: details
        run: |
          INSTANCE_ID=$(echo '${{ steps.provision.outputs.output }}' | python3 -c "
          import sys, json
          print(json.load(sys.stdin)['data']['id'])
          ")
          REGION=$(echo '${{ steps.provision.outputs.output }}' | python3 -c "
          import sys, json
          print(json.load(sys.stdin)['data']['region'])
          ")
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "REGION=$REGION" >> $GITHUB_OUTPUT

          echo "Waiting for public IP..."
          for i in $(seq 1 9); do
            sleep 10
            VNIC=$(oci compute instance list-vnics --instance-id "$INSTANCE_ID" 2>/dev/null)
            PUBLIC_IP=$(echo "$VNIC" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          vnics = data.get('data', [])
          print(vnics[0].get('publicIp', '') if vnics else '')
          " 2>/dev/null)
            if [ -n "$PUBLIC_IP" ] && [ "$PUBLIC_IP" != "None" ]; then
              echo "PUBLIC_IP=$PUBLIC_IP" >> $GITHUB_OUTPUT
              echo "Got IP: $PUBLIC_IP"
              break
            fi
            echo "Attempt $i: no IP yet..."
          done

      - name: Notify via Telegram
        if: steps.provision.outputs.status == 'success'
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT:  ${{ secrets.TELEGRAM_CHAT_ID }}
          PUBLIC_IP:   ${{ steps.details.outputs.PUBLIC_IP }}
          INSTANCE_ID: ${{ steps.details.outputs.INSTANCE_ID }}
          REGION:      ${{ steps.details.outputs.REGION }}
        run: |
          python3 -c "
          import json, urllib.request, os
          text = '\n'.join([
            'Oracle Ampere A1 Provisioned!', '',
            'Region:    ' + os.environ['REGION'],
            'Shape:     VM.Standard.A1.Flex (4 OCPU / 24 GB)',
            'Public IP: ' + os.environ['PUBLIC_IP'], '',
            'SSH command:',
            'ssh -i ~/.ssh/id_rsa ubuntu@' + os.environ['PUBLIC_IP'], '',
            'Workflow disabled. Instance is ready!'
          ])
          payload = json.dumps({'chat_id': os.environ['TG_CHAT'], 'text': text}).encode()
          req = urllib.request.Request(
            'https://api.telegram.org/bot' + os.environ['TG_TOKEN'] + '/sendMessage',
            data=payload, headers={'Content-Type': 'application/json'}
          )
          print(urllib.request.urlopen(req).read().decode())
          "

      - name: Disable workflow after success
        if: steps.provision.outputs.status == 'success'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.disableWorkflow({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'oracle-ampere-provision.yml'
            });

      - name: Write job summary
        if: always()
        run: |
          STATUS="${{ steps.provision.outputs.status }}"
          if [ "$STATUS" = "success" ]; then
            echo "## Provisioned!" >> $GITHUB_STEP_SUMMARY
            echo "Public IP: ${{ steps.details.outputs.PUBLIC_IP }}" >> $GITHUB_STEP_SUMMARY
          elif [ "$STATUS" = "capacity" ]; then
            echo "## Out of Capacity — retrying shortly" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Error — check logs" >> $GITHUB_STEP_SUMMARY
          fi
