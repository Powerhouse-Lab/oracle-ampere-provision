name: Oracle Ampere A1 Auto-Provisioner

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  provision:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      SUPPRESS_LABEL_WARNING: True
      OCI_CLI_USER:        ${{ secrets.OCI_USER_OCID }}
      OCI_CLI_TENANCY:     ${{ secrets.OCI_TENANCY_OCID }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_KEY_FINGERPRINT }}
      OCI_CLI_REGION:      ${{ secrets.OCI_REGION }}

    steps:
      - name: Install OCI CLI
        run: |
          pip install oci-cli --quiet
          oci --version

      - name: Configure OCI credentials
        env:
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_SSH_PUB: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
        run: |
          mkdir -p ~/.oci
          echo "" | base64 -d > /tmp/setup_oci.py
          python3 /tmp/setup_oci.py
          chmod 600 ~/.oci/oci_api_key.pem
          echo "--- Testing OCI auth ---"
          oci iam user get --user-id "$OCI_CLI_USER" --query "data.name" 2>&1

      - name: Retry provisioning loop
        id: provision
        run: |
          set +e
          STATUS="capacity"
          OUTPUT=""
          ADS=("${{ secrets.OCI_AD_1 }}" "${{ secrets.OCI_AD_2 }}" "${{ secrets.OCI_AD_3 }}")
          ATTEMPT=0
          END_TIME=$(( $(date +%s) + 240 ))

          while [ $(date +%s) -lt $END_TIME ]; do
            ATTEMPT=$((ATTEMPT + 1))
            AD=${ADS[$(( (ATTEMPT - 1) % 3 ))]}
            echo "Attempt $ATTEMPT — AD: $AD"

            OUTPUT=$(oci compute instance launch               --availability-domain    "$AD"               --compartment-id         "${{ secrets.OCI_COMPARTMENT_OCID }}"               --shape                  VM.Standard.A1.Flex               --shape-config           '{"ocpus":4,"memoryInGBs":24}'               --image-id               "${{ secrets.OCI_IMAGE_OCID }}"               --subnet-id              "${{ secrets.OCI_SUBNET_OCID }}"               --ssh-authorized-keys-file /tmp/ssh_pub.key               --display-name           "ampere-always-free"               --assign-public-ip       true               2>&1)

            EXIT_CODE=$?

            if [ $EXIT_CODE -eq 0 ]; then
              STATUS="success"
              echo "Provisioned on attempt $ATTEMPT, AD: $AD"
              break
            elif echo "$OUTPUT" | grep -q "Out of host capacity"; then
              echo "No capacity. Waiting 30s..."
              sleep 30
            else
              STATUS="error"
              echo "Unexpected error: $OUTPUT"
              break
            fi
          done

          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Extract instance details
        if: steps.provision.outputs.status == 'success'
        id: details
        run: |
          INSTANCE_ID=$(echo '${{ steps.provision.outputs.output }}' | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(data['data']['id'])
          ")
          REGION=$(echo '${{ steps.provision.outputs.output }}' | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(data['data']['region'])
          ")
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "REGION=$REGION" >> $GITHUB_OUTPUT

          echo "Waiting for public IP..."
          for i in $(seq 1 9); do
            sleep 10
            VNIC=$(oci compute instance list-vnics --instance-id "$INSTANCE_ID" 2>/dev/null)
            PUBLIC_IP=$(echo "$VNIC" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          vnics = data.get('data', [])
          print(vnics[0].get('publicIp', '') if vnics else '')
          " 2>/dev/null)
            if [ -n "$PUBLIC_IP" ] && [ "$PUBLIC_IP" != "None" ]; then
              echo "PUBLIC_IP=$PUBLIC_IP" >> $GITHUB_OUTPUT
              echo "Got IP: $PUBLIC_IP"
              break
            fi
            echo "Attempt $i: no IP yet..."
          done

      - name: Notify via Telegram
        if: steps.provision.outputs.status == 'success'
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT:  ${{ secrets.TELEGRAM_CHAT_ID }}
          PUBLIC_IP:   ${{ steps.details.outputs.PUBLIC_IP }}
          INSTANCE_ID: ${{ steps.details.outputs.INSTANCE_ID }}
          REGION:      ${{ steps.details.outputs.REGION }}
        run: |
          python3 -c "
          import json, urllib.request, os
          text = '\n'.join([
            'Oracle Ampere A1 Provisioned!', '',
            'Region:    ' + os.environ['REGION'],
            'Shape:     VM.Standard.A1.Flex (4 OCPU / 24 GB)',
            'Public IP: ' + os.environ['PUBLIC_IP'], '',
            'SSH command:',
            'ssh -i ~/.ssh/id_rsa ubuntu@' + os.environ['PUBLIC_IP'], '',
            'Workflow disabled. Instance is ready!'
          ])
          payload = json.dumps({'chat_id': os.environ['TG_CHAT'], 'text': text}).encode()
          req = urllib.request.Request(
            'https://api.telegram.org/bot' + os.environ['TG_TOKEN'] + '/sendMessage',
            data=payload, headers={'Content-Type': 'application/json'}
          )
          print(urllib.request.urlopen(req).read().decode())
          "

      - name: Disable workflow after success
        if: steps.provision.outputs.status == 'success'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.disableWorkflow({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'oracle-ampere-provision.yml'
            });

      - name: Write job summary
        if: always()
        run: |
          STATUS="${{ steps.provision.outputs.status }}"
          if [ "$STATUS" = "success" ]; then
            echo "## Provisioned!" >> $GITHUB_STEP_SUMMARY
            echo "Public IP: ${{ steps.details.outputs.PUBLIC_IP }}" >> $GITHUB_STEP_SUMMARY
          elif [ "$STATUS" = "capacity" ]; then
            echo "## Out of Capacity - next run in 5 min" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Unexpected error" >> $GITHUB_STEP_SUMMARY
          fi
