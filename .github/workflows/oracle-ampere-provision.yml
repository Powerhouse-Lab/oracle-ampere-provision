name: Auto-Build Jellyfin App
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'

      - name: Create App Scaffolding
        run: flutter create jellyfin_app

      - name: Install Dependencies
        working-directory: ./jellyfin_app
        run: |
          flutter pub add media_kit media_kit_video media_kit_libs_video dio screen_brightness

      - name: Configure Android Permissions, SDK & Kotlin Fix
        working-directory: ./jellyfin_app
        run: |
          # 1. Change Min SDK to 21 for MPV support
          sed -i 's/flutter.minSdkVersion/21/g' android/app/build.gradle
          
          # 2. Add Internet permission for Release builds
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml
          
          # 3. FIX THE KOTLIN ERROR: Upgrade Kotlin version to 1.9.22 so the brightness plugin compiles
          sed -i "s/ext.kotlin_version = '.*'/ext.kotlin_version = '1.9.22'/g" android/build.gradle

      - name: Write the App Code (Flutter + MPV)
        working-directory: ./jellyfin_app
        run: |
          cat << 'EOF' > lib/main.dart
          import 'dart:async';
          import 'package:flutter/material.dart';
          import 'package:media_kit/media_kit.dart';
          import 'package:media_kit_video/media_kit_video.dart';
          import 'package:screen_brightness/screen_brightness.dart';

          void main() {
            WidgetsFlutterBinding.ensureInitialized();
            MediaKit.ensureInitialized(); // Start MPV Native Engine
            runApp(const MaterialApp(home: PlayerScreen(), themeMode: ThemeMode.dark));
          }

          class PlayerScreen extends StatefulWidget {
            const PlayerScreen({Key? key}) : super(key: key);
            @override
            State<PlayerScreen> createState() => _PlayerScreenState();
          }

          class _PlayerScreenState extends State<PlayerScreen> {
            late final Player player;
            late final VideoController controller;
            bool showSkipIntro = false;

            @override
            void initState() {
              super.initState();
              // Feature: Direct Play, ASS Subtitles, Caching
              player = Player(
                configuration: const PlayerConfiguration(
                  mpv: ['--cache=yes', '--hwdec=auto-safe', '--sub-ass-override=no'],
                ),
              );
              controller = VideoController(player);

              player.open(Media('http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4'));

              player.stream.position.listen((pos) {
                // Feature: Auto Skip Intro Logic (Demo: 10s to 30s)
                if (pos.inSeconds >= 10 && pos.inSeconds <= 30 && !showSkipIntro) {
                  setState(() => showSkipIntro = true);
                } else if ((pos.inSeconds < 10 || pos.inSeconds > 30) && showSkipIntro) {
                  setState(() => showSkipIntro = false);
                }
              });
            }

            @override
            void dispose() {
              player.dispose();
              super.dispose();
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                backgroundColor: Colors.black,
                body: Stack(
                  children: [
                    // Feature: Gesture Controls
                    GestureDetector(
                      onDoubleTapDown: (details) {
                        final width = MediaQuery.of(context).size.width;
                        if (details.globalPosition.dx < width / 2) {
                          player.seek(player.state.position - const Duration(seconds: 10));
                        } else {
                          player.seek(player.state.position + const Duration(seconds: 10));
                        }
                      },
                      onVerticalDragUpdate: (details) async {
                        final width = MediaQuery.of(context).size.width;
                        final delta = details.delta.dy * -1;
                        if (details.globalPosition.dx > width / 2) {
                          player.setVolume((player.state.volume + delta).clamp(0.0, 100.0));
                        } else {
                          double current = await ScreenBrightness().current;
                          ScreenBrightness().setScreenBrightness((current + (delta / 100)).clamp(0.0, 1.0));
                        }
                      },
                      child: Video(controller: controller),
                    ),
                    // Skip Intro UI
                    if (showSkipIntro)
                      Positioned(
                        bottom: 80, right: 20,
                        child: ElevatedButton(
                          onPressed: () {
                            player.seek(const Duration(seconds: 30));
                            setState(() => showSkipIntro = false);
                          },
                          child: const Text("Skip Intro"),
                        ),
                      ),
                  ],
                ),
              );
            }
          }
          EOF

      - name: Compile Native Android APK
        working-directory: ./jellyfin_app
        run: flutter build apk --release

      - name: Upload Finished App to You
        uses: actions/upload-artifact@v4
        with:
          name: My-Jellyfin-App
          path: jellyfin_app/build/app/outputs/flutter-apk/app-release.apk
