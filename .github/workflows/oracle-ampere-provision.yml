name: Oracle Ampere A1 Auto-Provisioner

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  provision:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      OCI_CLI_USER:        ${{ secrets.OCI_USER_OCID }}
      OCI_CLI_TENANCY:     ${{ secrets.OCI_TENANCY_OCID }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_KEY_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY }}
      OCI_CLI_REGION:      ${{ secrets.OCI_REGION }}

    steps:
      # ── 1. Install OCI CLI ───────────────────────────────────────────────
      - name: Install OCI CLI
        run: |
          pip install oci-cli --quiet
          oci --version

      # ── 2. Configure OCI credentials ────────────────────────────────────
      - name: Configure OCI credentials
        run: |
          mkdir -p ~/.oci
          echo "$OCI_CLI_KEY_CONTENT" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          printf '[DEFAULT]\nuser=%s\ntenancy=%s\nfingerprint=%s\nkey_file=%s\nregion=%s\n' \
            "$OCI_CLI_USER" "$OCI_CLI_TENANCY" "$OCI_CLI_FINGERPRINT" \
            "~/.oci/oci_api_key.pem" "$OCI_CLI_REGION" > ~/.oci/config

      # ── 3. Attempt to launch Ampere A1 (try all 3 ADs) ──────────────────
      - name: Attempt Ampere provisioning
        id: provision
        run: |
          set +e
          STATUS="capacity"
          OUTPUT=""

          for AD in "${{ secrets.OCI_AD_1 }}" "${{ secrets.OCI_AD_2 }}" "${{ secrets.OCI_AD_3 }}"; do
            echo "Trying AD: $AD"
            OUTPUT=$(oci compute instance launch \
              --availability-domain  "$AD" \
              --compartment-id       "${{ secrets.OCI_COMPARTMENT_OCID }}" \
              --shape                VM.Standard.A1.Flex \
              --shape-config         '{"ocpus":4,"memoryInGBs":24}' \
              --image-id             "${{ secrets.OCI_IMAGE_OCID }}" \
              --subnet-id            "${{ secrets.OCI_SUBNET_OCID }}" \
              --ssh-authorized-keys  "${{ secrets.OCI_SSH_PUBLIC_KEY }}" \
              --display-name         "ampere-always-free" \
              --assign-public-ip     true \
              2>&1)

            EXIT_CODE=$?

            if [ $EXIT_CODE -eq 0 ]; then
              STATUS="success"
              echo "Provisioned on AD: $AD"
              break
            elif echo "$OUTPUT" | grep -q "Out of host capacity"; then
              echo "AD $AD: Out of capacity, trying next..."
            else
              STATUS="error"
              echo "AD $AD: Unexpected error: $OUTPUT"
              break
            fi
          done

          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ── 4. Extract public IP ─────────────────────────────────────────────
      - name: Extract instance details
        if: steps.provision.outputs.status == 'success'
        id: details
        run: |
          INSTANCE_ID=$(echo '${{ steps.provision.outputs.output }}' | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(data['data']['id'])
          ")
          REGION=$(echo '${{ steps.provision.outputs.output }}' | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(data['data']['region'])
          ")
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "REGION=$REGION" >> $GITHUB_OUTPUT
          echo "SHAPE=VM.Standard.A1.Flex" >> $GITHUB_OUTPUT

          echo "Waiting for public IP..."
          for i in $(seq 1 9); do
            sleep 10
            VNIC=$(oci compute instance list-vnics --instance-id "$INSTANCE_ID" 2>/dev/null)
            PUBLIC_IP=$(echo "$VNIC" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          vnics = data.get('data', [])
          print(vnics[0].get('publicIp', '') if vnics else '')
          " 2>/dev/null)
            if [ -n "$PUBLIC_IP" ] && [ "$PUBLIC_IP" != "None" ]; then
              echo "PUBLIC_IP=$PUBLIC_IP" >> $GITHUB_OUTPUT
              echo "Got IP: $PUBLIC_IP"
              break
            fi
            echo "Attempt $i: no IP yet..."
          done

      # ── 5. Telegram notification ─────────────────────────────────────────
      - name: Notify via Telegram
        if: steps.provision.outputs.status == 'success'
        run: |
          python3 - <<'PYEOF'
          import json, urllib.request

          public_ip   = "${{ steps.details.outputs.PUBLIC_IP }}"
          instance_id = "${{ steps.details.outputs.INSTANCE_ID }}"
          region      = "${{ steps.details.outputs.REGION }}"
          bot_token   = "${{ secrets.TELEGRAM_BOT_TOKEN }}"
          chat_id     = "${{ secrets.TELEGRAM_CHAT_ID }}"

          text = "\n".join([
            "Oracle Ampere A1 Provisioned!",
            "",
            "Region:    " + region,
            "Shape:     VM.Standard.A1.Flex (4 OCPU / 24 GB)",
            "Public IP: " + public_ip,
            "",
            "SSH command:",
            "ssh -i ~/.ssh/id_rsa ubuntu@" + public_ip,
            "",
            "Workflow disabled. Instance is ready!"
          ])

          payload = json.dumps({"chat_id": chat_id, "text": text}).encode("utf-8")
          req = urllib.request.Request(
            "https://api.telegram.org/bot" + bot_token + "/sendMessage",
            data=payload,
            headers={"Content-Type": "application/json"}
          )
          resp = urllib.request.urlopen(req)
          print("Telegram:", resp.read().decode())
          PYEOF

      # ── 6. Disable workflow after success ────────────────────────────────
      - name: Disable workflow after success
        if: steps.provision.outputs.status == 'success'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.disableWorkflow({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'oracle-ampere-provision.yml'
            });
            console.log('Workflow disabled.');

      # ── 7. Job summary ───────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          STATUS="${{ steps.provision.outputs.status }}"
          if [ "$STATUS" = "success" ]; then
            echo "## Provisioned!" >> $GITHUB_STEP_SUMMARY
            echo "Public IP: ${{ steps.details.outputs.PUBLIC_IP }}" >> $GITHUB_STEP_SUMMARY
          elif [ "$STATUS" = "capacity" ]; then
            echo "## Out of Capacity - retrying in 15 min" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Unexpected error" >> $GITHUB_STEP_SUMMARY
          fi
